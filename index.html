<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Creascola Credit Leaderboard</title>
  <link rel="icon" href="data:," />
  <style>
    :root{
      --bg1:#0a0f1a;
      --bg2:#1c2a48;
      --card:#222;
      --accent:#00f6ff;
      --accent-2:#00c8d6;
    }
    body{
      margin:0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
      min-height:100vh;
      box-sizing:border-box;
    }

    h1{
      margin:18px 0;
      font-size:clamp(1.8rem,5vw,3rem);
      color:var(--accent);
      text-shadow:0 0 14px rgba(0,246,255,0.15);
    }

    .leaderboard{
      width:100%;
      max-width:760px;
      background:rgba(34,34,34,0.92);
      border-radius:18px;
      padding:20px;
      box-shadow:0 8px 30px rgba(0,246,255,0.06);
      box-sizing:border-box;
    }

    .class-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,0.04);
      font-size:clamp(1rem,2.4vw,1.3rem);
      gap:8px;
    }

    .class-row .left{
      display:flex;
      align-items:center;
      gap:12px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .class-row .place{
      font-weight:700;
      min-width:90px;
      text-align:left;
    }

    .class-row .name{
      font-weight:600;
      letter-spacing:0.6px;
    }

    .class-row .pts{
      font-weight:700;
      min-width:120px;
      text-align:right;
    }

    /* Top3 highlights */
    .gold{
      box-shadow: inset 0 0 18px rgba(255,215,0,0.06), 0 6px 18px rgba(255,215,0,0.04);
      border-left:4px solid #ffd700;
    }
    .silver{
      box-shadow: inset 0 0 18px rgba(192,192,192,0.06), 0 6px 18px rgba(192,192,192,0.03);
      border-left:4px solid #c0c0c0;
    }
    .bronze{
      box-shadow: inset 0 0 18px rgba(205,127,50,0.05), 0 6px 18px rgba(205,127,50,0.03);
      border-left:4px solid #cd7f32;
    }

    /* login icon & panel */
    #login-icon{
      position:fixed;
      top:14px;
      right:14px;
      font-size:1.9rem;
      background:transparent;
      border:none;
      color:var(--accent);
      cursor:pointer;
      z-index:999;
      width:auto;
      max-width:none;
      padding:4px 8px;
    }

    #login-area{
      display:none;
      position:fixed;
      top:64px;
      right:14px;
      background:var(--card);
      padding:14px;
      border-radius:12px;
      box-shadow:0 8px 26px rgba(0,0,0,0.6);
      width:320px;
      max-width:90%;
      z-index:998;
    }

    #login-area input, #points-area input, #points-area select{
      width:92%;
      padding:10px;
      margin:8px 0;
      border-radius:8px;
      border:none;
      text-align:center;
      font-size:1rem;
      box-sizing:border-box;
    }

    #points-area{
      margin:18px auto 12px;
      display:block;
      max-width:520px;
      text-align:center;
    }

    button{
      background:var(--accent);
      border:none;
      padding:10px 16px;
      border-radius:10px;
      color:#000;
      font-weight:700;
      cursor:pointer;
      transition:all .15s ease;
      width:82%;
      max-width:260px;
    }
    button:hover{ background:var(--accent-2) }

    #logout-btn{
      margin-top:10px;
      background:#ff4444;
      color:#fff;
    }
    #logout-btn:hover{ background:#cc0000; }

    /* position change indicator */
    .trend{
      font-size:1.1rem;
      font-weight:700;
      min-width:28px;
      text-align:center;
    }
    .trend.up{   color:#00e676; }
    .trend.down{ color:#ff1744; }
    .trend.same{ color:#888;    }

    /* help button */
    #help-btn{
      position:fixed;
      bottom:18px;
      right:18px;
      width:42px;
      height:42px;
      border-radius:50%;
      background:var(--accent);
      color:#000;
      font-size:1.3rem;
      font-weight:700;
      border:none;
      cursor:pointer;
      z-index:999;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 4px 14px rgba(0,246,255,0.3);
      max-width:42px;
      padding:0;
    }
    #help-btn:hover{ background:var(--accent-2); }

    #help-modal{
      display:none;
      position:fixed;
      bottom:72px;
      right:18px;
      background:var(--card);
      border-radius:14px;
      padding:16px 20px;
      box-shadow:0 8px 26px rgba(0,0,0,0.6);
      z-index:998;
      width:240px;
      max-width:88vw;
    }
    #help-modal h4{
      margin:0 0 10px 0;
      color:var(--accent);
      font-size:1rem;
    }
    #help-modal .help-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin:8px 0;
      font-size:0.95rem;
    }

    /* small screens spacing */
    @media (max-width:520px){
      .class-row{ padding:10px; font-size:1rem; }
      .class-row .place{ min-width:72px; font-size:0.95rem; }
      .class-row .pts{ min-width:96px; font-size:0.95rem; }
      #login-area{ right:8px; top:60px; width:92%; }
    }
  </style>
</head>
<body>
  <h1>🏆 Creascola Credit Leaderboard</h1>

  <button id="login-icon" onclick="toggleLogin()" aria-label="Open login">🔑</button>

  <div id="login-area" aria-hidden="true">
    <h3 style="margin:0 0 8px 0;color:var(--accent)">Login</h3>
    <input id="username" type="text" placeholder="Username" autocomplete="off" />
    <input id="password" type="password" placeholder="Password" autocomplete="off" />
    <div style="display:flex;justify-content:center">
      <button onclick="login()">Login</button>
    </div>
    <p id="login-status" style="margin:6px 0 0 0;font-size:0.95rem"></p>
  </div>

  <div id="points-area" style="display:none;">
    <h3 style="margin:6px 0 8px 0">Add or Remove Points</h3>
    <select id="class-select" aria-label="Choose class">
      <option value="7A">7A</option>
      <option value="6B">6B</option>
      <option value="6A">6A</option>
      <option value="5A">5A</option>
      <option value="5B">5B</option>
      <option value="8A">8A</option>
    </select><br/>
    <input id="points-input" type="text" placeholder="Enter points (e.g. 5 or -2)" />
    <div style="display:flex;justify-content:center;flex-direction:column;align-items:center;gap:8px;">
      <button onclick="updatePoints()">Update Points</button>
      <button id="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="leaderboard" id="leaderboard" aria-live="polite"></div>

  <!-- Help button -->
  <button id="help-btn" onclick="toggleHelp()" aria-label="Help">?</button>
  <div id="help-modal" aria-hidden="true">
    <h4>📖 What do the symbols mean?</h4>
    <div class="help-row"><span style="color:#00e676;font-size:1.3rem">▲</span> The class moved up in the rankings</div>
    <div class="help-row"><span style="color:#ff1744;font-size:1.3rem">▼</span> The class moved down in the rankings</div>
    <div class="help-row"><span style="color:#888;font-size:1.3rem">—</span> No change in position</div>
  </div>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <!-- Your firebase-config.js should define: const firebaseConfig = { ... } -->
  <script src="firebase-config.js"></script>

  <script>
    // initialize firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // classes (order here doesn't matter; sorting is automatic)
    const classes = ["7A","6B","6A","5A","5B","8A"];
    let scores = {};
    let previousPositions = {}; // persisted in Firebase

    // The email domain used for all admin accounts in Firebase Auth
    const EMAIL_DOMAIN = "@creascola.hu";

    // helper: build position map from scores {className: rankIndex}
    function buildPositions(scoresObj){
      const sorted = Object.entries(scoresObj)
        .filter(([cls]) => classes.includes(cls))
        .sort((a,b) => Number(b[1]) - Number(a[1]));
      const pos = {};
      sorted.forEach(([cls], i) => pos[cls] = i);
      return pos;
    }

    // UI helpers
    function toggleLogin(){
      const area = document.getElementById('login-area');
      const isHidden = area.style.display === 'none' || area.style.display === '';
      area.style.display = isHidden ? 'block' : 'none';
      area.setAttribute('aria-hidden', !isHidden);
    }

    function login(){
      const username = document.getElementById('username').value.trim().toLowerCase();
      const pass = document.getElementById('password').value;
      const status = document.getElementById('login-status');

      if(!username || !pass){
        status.textContent = "❌ Please enter username and password.";
        return;
      }

      // Build the Firebase email from the username
      const email = username + EMAIL_DOMAIN;
      status.textContent = "⏳ Logging in...";

      auth.signInWithEmailAndPassword(email, pass)
        .then(() => {
          // onAuthStateChanged handles the rest
          document.getElementById('login-area').style.display = 'none';
          document.getElementById('username').value = '';
          document.getElementById('password').value = '';
        })
        .catch(err => {
          console.error("Login error:", err.code);
          status.textContent = "❌ Wrong username or password.";
        });
    }

    function logout(){
      auth.signOut().catch(err => console.error("Logout error:", err));
    }

    // React to auth state changes
    auth.onAuthStateChanged(user => {
      if(user){
        document.getElementById('points-area').style.display = 'block';
      } else {
        document.getElementById('points-area').style.display = 'none';
        document.getElementById('login-status').textContent = '';
      }
    });

    // update points (supports negative numbers like "-2")
    function updatePoints(){
      if(!auth.currentUser){
        alert("Please log in first.");
        return;
      }

      const selected = document.getElementById('class-select').value;
      const raw = document.getElementById('points-input').value.trim();

      if(!/^[-+]?\d+$/.test(raw)){
        alert("Please enter a valid integer (e.g. 5 or -2).");
        return;
      }

      const points = parseInt(raw, 10);
      if(!scores[selected]) scores[selected] = 0;

      // save current positions as "previous" before updating
      const currentPositions = buildPositions(scores);

      scores[selected] = Number(scores[selected]) + points;
      if(scores[selected] < 0) scores[selected] = 0;

      // write scores and previousPositions to Firebase atomically
      db.ref().update({
        scores: scores,
        previousPositions: currentPositions
      }).catch(err => {
        console.error("Firebase write failed:", err);
        alert("Failed to update scores. Check console.");
      });

      document.getElementById('points-input').value = '';
    }

    // render sorted leaderboard with trophy icons for top3
    function renderLeaderboard(){
      const lb = document.getElementById('leaderboard');
      lb.innerHTML = '<h3 style="margin-top:0">Leaderboard</h3>';

      classes.forEach(c => {
        if(scores[c] === undefined) scores[c] = 0;
      });

      const sorted = Object.entries(scores)
        .filter(([cls]) => classes.includes(cls))
        .sort((a,b) => Number(b[1]) - Number(a[1]));

      sorted.forEach(([cls, pts], index) => {
        const numPts = Number(pts) || 0;
        let placeLabel = '';
        let rowClass = '';

        if(index === 0){ placeLabel = '🏆 1st'; rowClass = 'gold'; }
        else if(index === 1){ placeLabel = '🥈 2nd'; rowClass = 'silver'; }
        else if(index === 2){ placeLabel = '🥉 3rd'; rowClass = 'bronze'; }
        else { placeLabel = (index+1) + '.'; }

        // trend indicator
        let trendSymbol = '—';
        let trendClass = 'same';
        if(previousPositions && previousPositions[cls] !== undefined){
          const prev = previousPositions[cls];
          if(index < prev){ trendSymbol = '▲'; trendClass = 'up'; }
          else if(index > prev){ trendSymbol = '▼'; trendClass = 'down'; }
        }

        const row = document.createElement('div');
        row.className = 'class-row ' + rowClass;

        const left = document.createElement('div');
        left.className = 'left';
        const placeSpan = document.createElement('div');
        placeSpan.className = 'place';
        placeSpan.textContent = placeLabel;
        const nameSpan = document.createElement('div');
        nameSpan.className = 'name';
        nameSpan.textContent = cls;

        // trend span
        const trendSpan = document.createElement('div');
        trendSpan.className = 'trend ' + trendClass;
        trendSpan.textContent = trendSymbol;

        left.appendChild(placeSpan);
        left.appendChild(nameSpan);
        left.appendChild(trendSpan);

        const ptsSpan = document.createElement('div');
        ptsSpan.className = 'pts';
        ptsSpan.textContent = `${numPts} pts`;

        row.appendChild(left);
        row.appendChild(ptsSpan);
        lb.appendChild(row);
      });

      if(sorted.length === 0){
        classes.forEach((c, i) => {
          const r = document.createElement('div');
          r.className = 'class-row';
          r.innerHTML = `<div class="left"><div class="place">${i+1}.</div><div class="name">${c}</div></div><div class="pts">0 pts</div>`;
          lb.appendChild(r);
        });
      }
    }

    // subscribe to scores (live updates)
    db.ref('scores').on('value', snapshot => {
      scores = snapshot.val() || {};
      classes.forEach(c => { if(scores[c] === undefined) scores[c] = 0; });
      renderLeaderboard();
    }, err => {
      console.error("Firebase read failed:", err);
    });

    // subscribe to previousPositions
    db.ref('previousPositions').on('value', snapshot => {
      previousPositions = snapshot.val() || {};
      renderLeaderboard();
    }, err => {
      console.error("Firebase previousPositions read failed:", err);
    });

    // help modal toggle
    function toggleHelp(){
      const modal = document.getElementById('help-modal');
      const isHidden = modal.style.display === 'none' || modal.style.display === '';
      modal.style.display = isHidden ? 'block' : 'none';
      modal.setAttribute('aria-hidden', !isHidden);
    }

    // close help modal if clicking outside
    document.addEventListener('click', (e) => {
      const modal = document.getElementById('help-modal');
      const btn = document.getElementById('help-btn');
      if(modal.style.display === 'block' && !modal.contains(e.target) && e.target !== btn){
        modal.style.display = 'none';
      }
    });

    // allow Enter in password field to submit
    document.addEventListener('keydown', (e) => {
      const active = document.activeElement;
      if(e.key === 'Enter'){
        if(active && (active.id === 'username' || active.id === 'password')){
          login();
        } else if(active && active.id === 'points-input'){
          updatePoints();
        }
      }
    });
  </script>
</body>
</html>
