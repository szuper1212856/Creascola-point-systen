<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Creascola Credit Leaderboard</title>

  <style>
    :root{
      --bg1:#0a0f1a; --bg2:#1c2a48; --card:#222;
      --accent:#00f6ff; --accent2:#00c8d6;
    }
    body{
      margin:0; font-family:Segoe UI, sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:white; padding:20px; display:flex;
      flex-direction:column; align-items:center;
    }
    h1{ color:var(--accent); text-shadow:0 0 14px #00f7; }
    .leaderboard{
      width:100%; max-width:760px;
      background:#222d; padding:20px;
      border-radius:16px;
    }
    .class-row{
      display:flex; justify-content:space-between;
      padding:12px 14px; border-bottom:1px solid #fff1;
    }
    .left{ display:flex; gap:10px; }
    .place{ width:70px; font-weight:bold; }
    .pts{ width:120px; text-align:right; font-weight:bold; }
    .gold{ border-left:4px solid gold; }
    .silver{ border-left:4px solid silver; }
    .bronze{ border-left:4px solid #cd7f32; }
    #login-icon{
      position:fixed; right:15px; top:15px;
      font-size:2rem; background:none; color:var(--accent);
      border:none; cursor:pointer;
    }
    #login-area{
      display:none; position:fixed; right:15px; top:70px;
      background:#222; padding:15px; width:300px;
      border-radius:12px;
    }
    #login-area input{
      width:90%; padding:10px; margin:7px 0;
      border-radius:8px; border:none;
    }
    #points-area{ display:none; margin-top:15px; }
    #points-area input, #points-area select{
      width:90%; padding:10px; margin:7px 0;
      border-radius:8px; border:none;
    }
    button{
      background:var(--accent); border:none;
      padding:10px 16px; border-radius:10px;
      cursor:pointer; font-weight:bold;
    }
    button:hover{ background:var(--accent2); }
  </style>
</head>
<body>

<h1>🏆 Creascola Credit Leaderboard</h1>

<button id="login-icon" onclick="toggleLogin()">🔑</button>

<div id="login-area">
  <h3>Admin Login</h3>
  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password" type="password">
  <button onclick="login()">Login</button>
  <p id="login-status"></p>
</div>

<div id="points-area">
  <h3>Add / Remove Points</h3>
  <select id="class-select">
    <option>7A</option><option>6B</option><option>6A</option>
    <option>5A</option><option>5B</option><option>8A</option>
  </select>
  <input id="points-input" placeholder="Points (ex: 5 or -2)">
  <button onclick="updatePoints()">Update Points</button>
</div>

<div class="leaderboard" id="leaderboard"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<!-- YOUR firebase-config.js -->
<script src="firebase-config.js"></script>

<script>
firebase.initializeApp(firebaseConfig);
const rtdb = firebase.database();      // For scores
const fs = firebase.firestore();       // For admin login

const classes = ["7A","6B","6A","5A","5B","8A"];
let scores = {};
let loggedIn = false;

// Toggle login popup
function toggleLogin(){
  const a = document.getElementById("login-area");
  a.style.display = a.style.display === "block" ? "none" : "block";
}

// SECURE Firestore Login
async function login(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  const status = document.getElementById("login-status");

  try{
    const doc = await fs.collection("validUsers").doc(user).get();
    if(!doc.exists){ status.textContent = "❌ Invalid login"; return; }

    const realPass = doc.data().password;
    if(pass !== realPass){
      status.textContent = "❌ Wrong password";
      return;
    }

    loggedIn = true;
    status.textContent = "✅ Logged in!";
    document.getElementById("points-area").style.display = "block";
    document.getElementById("login-area").style.display = "none";

  } catch(e){
    console.error(e);
    status.textContent = "⚠️ Error connecting to server";
  }
}

// Update points
function updatePoints(){
  if(!loggedIn) return alert("Login required!");

  const c = document.getElementById("class-select").value;
  const raw = document.getElementById("points-input").value.trim();

  if(!/^-?\d+$/.test(raw)) return alert("Enter a valid number");

  scores[c] = (Number(scores[c]) || 0) + Number(raw);
  if(scores[c] < 0) scores[c] = 0;

  rtdb.ref("scores").set(scores);
  document.getElementById("points-input").value = "";
}

// Show leaderboard
function render(){
  const lb = document.getElementById("leaderboard");
  lb.innerHTML = "<h3>Leaderboard</h3>";

  const sorted = Object.entries(scores)
    .sort((a,b)=>b[1]-a[1]);

  sorted.forEach(([cls,pts],i)=>{
    let place = (i+1)+".";
    let rowClass = "";

    if(i===0){ place="🏆 1st"; rowClass="gold"; }
    if(i===1){ place="🥈 2nd"; rowClass="silver"; }
    if(i===2){ place="🥉 3rd"; rowClass="bronze"; }

    lb.innerHTML += `
      <div class="class-row ${rowClass}">
        <div class="left">
          <div class="place">${place}</div>
          <div>${cls}</div>
        </div>
        <div class="pts">${pts} pts</div>
      </div>`;
  });
}

// RTDB live updates
rtdb.ref("scores").on("value", snap=>{
  scores = snap.val() || {};
  classes.forEach(c => { if(!scores[c]) scores[c]=0; });
  render();
});
</script>

</body>
</html>
